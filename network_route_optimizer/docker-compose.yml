version: "3.9"

services:
  # ── Application ──────────────────────────────────────────────────────────
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_SECRET_KEY=change-me-in-production
    volumes:
      - .:/app          # live-reload during development
    depends_on:
      db:
        condition: service_healthy

  # ── PostgreSQL (swap SQLite for production-grade DB) ─────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: network_routes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: